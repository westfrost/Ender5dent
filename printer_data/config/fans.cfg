[controller_fan my_stepper_fan]
pin: PC7                # Replace with your actual fan pin
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
fan_speed: 0.5           # Set speed (0.0 - 1.0)
idle_timeout: 60         # Seconds to run after motors stop
stepper: stepper_x, stepper_y, stepper_z, extruder # List steppers

[heater_fan heatbreak_cooling_fan]
pin: PB15
heater: extruder
heater_temp: 35.0

[fan]
pin: PC6
max_power: 1.0
shutdown_speed: 0